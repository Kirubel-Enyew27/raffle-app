name: End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: raffle
          POSTGRES_PASSWORD: raffle_dev
          POSTGRES_DB: raffle_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Set up Go Backend ───
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Generate JWT Keys
        run: |
          mkdir -p certs
          openssl genrsa -out certs/private.pem 2048
          openssl rsa -in certs/private.pem -pubout -out certs/public.pem

      - name: Run Database Migrations
        run: |
          # Apply migrations using psql
          PGPASSWORD=raffle_dev psql -h localhost -U raffle -d raffle_db -f backend/migrations/20240101000001_init_schema.up.sql
          PGPASSWORD=raffle_dev psql -h localhost -U raffle -d raffle_db -f backend/migrations/20240101000002_add_draw_proofs.up.sql
          # Seed the default admin user
          ADMIN_HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'admin123', bcrypt.gensalt()).decode())")
          PGPASSWORD=raffle_dev psql -h localhost -U raffle -d raffle_db -c "INSERT INTO users (id, email, password_hash, role) VALUES ('00000000-0000-0000-0000-000000000002', 'admin@raffle.com', '$ADMIN_HASH', 'admin') ON CONFLICT DO NOTHING;"

      - name: Start Go Backend Server
        env:
          APP_ENV: development
          APP_PORT: 8080
          APP_DEBUG: "true"
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: raffle
          DB_PASSWORD: raffle_dev
          DB_NAME: raffle_db
          DB_SSL_MODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_PRIVATE_KEY_PATH: ../certs/private.pem
          JWT_PUBLIC_KEY_PATH: ../certs/public.pem
        run: |
          cd backend
          go run cmd/server/main.go &
          # Wait for backend to be healthy
          for i in {1..10}; do
            curl -s http://localhost:8080/api/v1/auth/login && break || sleep 2
          done

      # ─── Set up Frontend & Playwright ───
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright Browsers & OS Dependencies
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        env:
          CI: "true"
          API_URL: http://localhost:8080/api/v1
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
